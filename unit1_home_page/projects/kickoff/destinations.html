    <main>
        <section class="page-header">
            <h1>Affordable Destinations</h1>
            <p>Explore the world without breaking the bank.</p>
        </section>

        <section class="destinations">
            <div class="grid">

                    <figure class="card">
                            <img loading="lazy" src="pic/Bali.jpg" alt="Bali beach">
                        <figcaption>
                            <h3>Bali</h3>
                            <p>Trips from $20/day</p>
                            <p class="desc">Bali is known for its tropical beaches, warm culture, and incredibly affordable
                            travel options. Visitors love the mix of relaxation and adventure, from surfing in Kuta to
                            exploring Ubud’s rice terraces.</p>
                        </figcaption>
                    </figure>

                    <figure class="card">
                            <img loading="lazy" src="pic/Vietnam.jpg" alt="Vietnam scenery">
                        <figcaption>
                            <h3>Vietnam</h3>
                            <p>Trips from $18/day</p>
                            <p class="desc">Vietnam delivers some of the best value travel experiences in the world. From the
                            bustling streets of Hanoi to the peaceful lantern-lit nights in Hoi An, the country is full of
                            color and energy.</p>
                        </figcaption>
                    </figure>

                    <figure class="card">
                            <img loading="lazy" src="pic/Morocco.jpg" alt="Morocco">
                        <figcaption>
                            <h3>Morocco</h3>
                            <p>Trips from $35/day</p>
                            <p class="desc">Morocco blends ancient markets, desert landscapes, and vibrant cities into an
                            unforgettable budget adventure. Travelers can wander through Marrakech’s souks or ride camels in
                            the Sahara.</p>
                        </figcaption>
                    </figure>

                    <figure class="card">
                            <img loading="lazy" src="pic/Philippines.jpg" alt="Philippines islands">
                        <figcaption>
                            <h3>Philippines</h3>
                            <p>Trips from $22/day</p>
                            <p class="desc">The Philippines is a paradise of island hopping, clear water, and friendly locals.
                            With thousands of islands to explore, it offers tropical beauty at a very budget-friendly price.
                            </p>
                        </figcaption>
                    </figure>

            </div>
        </section>

        <section class="destinations">
            <h2>Top Budget Destinations</h2>
            <div class="grid">
                <figure class="card">
                    <img loading="lazy" src="pic/download.jpg" alt="Thailand beach">
                    <figcaption>
                        <h3>Thailand</h3>
                        <p>Trips from $25/day</p>
                        <p class="desc">Thailand is one of the world’s most welcoming destinations for travelers looking to
                        stretch their budget. From the lively streets of Bangkok to the peaceful temples of Chiang Mai,
                        the country offers a mix of culture, food, and adventure at a price that’s hard to beat.</p>

                        <p class="desc">The southern islands add another layer of magic with turquoise water, soft sand, and
                        dramatic limestone cliffs. Even popular spots like Phuket and Krabi offer affordable stays and
                        activities, making Thailand a perfect destination for budget‑friendly exploration.</p>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="pic/portugal.jpg" alt="Portugal coast">
                    <figcaption>
                        <h3>Portugal</h3>
                        <p>Trips from $40/day</p>
                        <p class="desc">Portugal blends old‑world charm with modern comfort, making it a great choice for
                        budget‑minded travelers. Cities like Lisbon and Porto are full of colorful streets, historic
                        buildings, and scenic viewpoints that don’t cost anything to enjoy.</p>

                        <p class="desc">Beyond the cities, Portugal’s coastline offers sunny weather, clear water, and
                        plenty of affordable places to stay. Inland towns provide culture and history without the
                        crowds, making Portugal a strong choice for travelers who want beauty and value.</p>
                    </figcaption>
                </figure>

                <figure class="card">
                    <img loading="lazy" src="pic/mexico.jpg" alt="Mexico beach">
                    <figcaption>
                        <h3>Mexico</h3>
                        <p>Trips from $30/day</p>
                        <p class="desc">Mexico offers an incredible range of experiences for travelers on a budget. From the
                        vibrant streets of Mexico City to the colorful markets of Oaxaca, the country is full of
                        culture, history, and amazing food at very low prices.</p>

                        <p class="desc">Mexico’s beaches add even more value, with warm water, beautiful scenery, and plenty
                        of budget‑friendly hotels. Whether you’re into nature, food, or culture, Mexico delivers a rich
                        travel experience without overspending.</p>
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>
