<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator For Paint And Flooring</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/small.css">
    <link rel="stylesheet" href="css/medium.css">
    <link rel="stylesheet" href="css/large.css">


</head>

<body>

    <header>
        <h1>Calculator For Paint And Flooring</h1>
    </header>

    <main>
        <div class="data">
            <label>Room Width <input type="number" id="width" value="15"> In Feet</label>
            <label>Room Depth <input type="number" id="depth" value="15"> In Feet</label>
            <label>Room Height <input type="number" id="height" value="15"> In Feet</label>

            Paint Quality
            <select id="quality">
                <option value="" disabled selected>Select a paint quality</option>
                <option value="600">Premium</option>
                <option value="500">Standard</option>
                <option value="400">Economy</option>
            </select>

            <button id="Calculate">Calculate</button>
        </div>

        <section>
            <div>
                <h2>Paint Supplies</h2>
                <ul id="paint"></ul>
            </div>

            <div>
                <h2>Carpet Supplies</h2>
                <ul id="carpet"></ul>
            </div>
        </section>

    </main>

    <footer>
        <p>Easton Fraser &bull; Unit 4 Home Improvement Calculator</p>
    </footer>

    <script src="js/scripts.js"></script>
</body>

</html>
